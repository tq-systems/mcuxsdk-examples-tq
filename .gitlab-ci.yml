
image: "vgitlab01.tq-net.de:5005/tq-embedded/tqmaxx/mcuxsdk-examples-tq/bare:ubuntu-22.04"
stages:
  - build
import_sdk_and_compile:
  tags:
    - tqmaxx
  stage: build
  before_script:
    - echo "Importing and patching SDK"
    - scripts/prepare.sh
  script:
    - echo "Building tagets"
    - scripts/build.sh
  artifacts:
    when: on_success
    paths:
      - "*.tar.gz"
      - "./build/*.tar.gz"
      - "./build/artifacts/*.tar.gz"
