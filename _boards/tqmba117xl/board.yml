board.hardware_data:
  section-type: manifest_content
  contents:
    total_memory:
      flash_size_kb: 0x00010000
      ram_size_kb: 0x00010000
    memory:
      memoryBlock:
      - id: BOARD_FLASH_${board}
        name: BOARD_FLASH
        type: ExtFlash
        access: RO
        startup: true
        addr: 0x30000000
        size: 0x04000000
      - id: BOARD_SDRAM_${board}
        name: BOARD_SDRAM
        type: RAM
        access: RW
        addr: 0x80000000
        size: 0x03000000
      - id: NCACHE_REGION_${board}
        name: NCACHE_REGION
        type: RAM
        access: RW
        addr: 0x83000000
        size: 0x01000000

board.cores:
  - id: core0
    name: Cortex-M7
    core_id: cm7
    support : true
  - id : core1
    name: Cortex-M4
    core_id: cm4
    support : false
